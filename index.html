<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAIN | Entrance</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #c8a97e;
            --text: #ffffff;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            /* We'll use the custom cursor */
        }

        /* Particles Layer */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay to darken slightly */
        #mask {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent, rgba(0, 0, 0, 0.8));
            z-index: 2;
            pointer-events: none;
        }

        /* Content Context */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            padding: 2rem;
            max-width: 1000px;
        }

        .meta-text {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--text);
            opacity: 0;
            transform: translateY(20px);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .main-logo {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            margin-bottom: 2.5rem;
            opacity: 0;
            transform: translateY(40px);
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }

        .main-logo .outline {
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.2);
            color: transparent;
        }

        .description {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(20px);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1.2rem 3rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            transition: all 0.5s var(--ease);
            opacity: 0;
            transform: translateY(20px);
            cursor: none;
            overflow: hidden;
            position: relative;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s var(--ease);
            z-index: -1;
            opacity: 0.1;
        }

        .enter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            padding-right: 4rem;
            box-shadow: 0 0 30px rgba(200, 169, 126, 0.15);
        }

        .enter-btn:hover::before {
            transform: translate(-50%, -50%) scale(1);
        }

        .enter-btn .arrow {
            transition: transform 0.5s var(--ease);
        }

        .enter-btn:hover .arrow {
            transform: translateX(10px);
        }

        .sub-link {
            display: block;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0;
        }

        /* Custom Cursor Elements */
        #cursor-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.15s linear;
        }

        #cursor-ring {
            width: 40px;
            height: 40px;
            border: 1.5px solid rgba(200, 169, 126, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, transform 0.3s var(--ease), border-color 0.3s;
        }

        .hover-active #cursor-ring {
            width: 70px;
            height: 70px;
            background: rgba(200, 169, 126, 0.05);
            border-color: var(--accent);
        }

        /* Animations */
        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .revealed {
            animation: reveal 1.2s var(--ease) forwards;
        }
    </style>
</head>

<body>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <canvas id="canvas"></canvas>
    <div id="mask"></div>

    <div class="content">
        <div class="meta-text" id="meta">YH. 2026</div>
        <h1 class="main-logo" id="logo">
            HAIN<span class="outline">.</span>
        </h1>
        <p class="description" id="desc">
            遊戲美術 × 嵌入式 AI × 硬體整合 / 用技術驅動創意，用藝術表達工程。
        </p>
        <a href="./home.html" class="enter-btn" id="enter-btn">
            進入系統 <span class="arrow">→</span>
        </a>
        <span class="sub-link" id="sub">ENTER EXPERIENCE</span>
    </div>

    <script>
        // Custom Cursor Logic
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let mX = 0, mY = 0, rX = 0, rY = 0;

        window.addEventListener('mousemove', e => {
            mX = e.clientX;
            mY = e.clientY;
            dot.style.left = mX + 'px';
            dot.style.top = mY + 'px';
        });

        function animCursor() {
            rX += (mX - rX) * 0.15;
            rY += (mY - rY) * 0.15;
            ring.style.left = rX + 'px';
            ring.style.top = rY + 'px';
            requestAnimationFrame(animCursor);
        }
        animCursor();

        // Hover Effect
        const b = document.getElementById('enter-btn');
        b.addEventListener('mouseenter', () => document.body.classList.add('hover-active'));
        b.addEventListener('mouseleave', () => document.body.classList.remove('hover-active'));

        // Particle Canvas logic (Lightweight version of main background)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.life = Math.random() * 0.5 + 0.2;
                this.r = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(200, 169, 126, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = [];
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function loop() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        init();
        loop();

        // Text reveal sequences
        window.addEventListener('load', () => {
            const sequence = [
                { id: 'meta', delay: 200 },
                { id: 'logo', delay: 400 },
                { id: 'desc', delay: 600 },
                { id: 'enter-btn', delay: 900 },
                { id: 'sub', delay: 1100 }
            ];

            sequence.forEach(item => {
                setTimeout(() => {
                    document.getElementById(item.id).classList.add('revealed');
                }, item.id === 'logo' ? item.delay + 300 : item.delay);
                // Giant logo take slightly longer to feel 'heavy'
            });
        });
    </script>
</body>

</html>
