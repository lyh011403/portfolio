<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訓練數據詳細報告</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #ffffff;
            --border: #e9ecef;
            --accent-blue: #007aff;
            --accent-grey: #8e8e93;
            --accent-purple: #5856d6;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f7;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            padding-bottom: 5rem;
            cursor: none;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        header {
            margin-bottom: 3rem;
            text-align: left;
            border-left: 6px solid var(--accent-blue);
            padding-left: 1.5rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #000;
        }

        /* Custom Cursor */
        #cursor-dot {
            width: 8px;
            height: 8px;
            background: #c8a97e;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s linear;
        }

        #cursor-ring {
            width: 32px;
            height: 32px;
            border: 1.5px solid rgba(200, 169, 126, 0.4);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, transform 0.3s var(--ease);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2.5rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #dee2e6;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-sub);
            border: none;
            padding: 1rem 0;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn.active {
            color: var(--accent-blue);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-blue);
            border-radius: 10px;
        }

        /* Sections */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeInUp 0.7s var(--ease) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Report Box */
        .report-box {
            background: #fff;
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.04);
            margin-bottom: 2.5rem;
            border: 1px solid #eee;
            position: relative;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            color: #000;
        }

        /* Bar Chart */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .bar-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            align-items: center;
            gap: 2.5rem;
        }

        .cat-name {
            font-weight: 700;
            color: #333;
            font-size: 1.1rem;
        }

        .bar-pair {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .bar-bg {
            background: #f2f2f7;
            height: 36px;
            border-radius: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 12px;
            width: 0%;
            transition: width 2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1.2rem;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 800;
        }

        .bar-fill.v1 {
            background: linear-gradient(90deg, #999, #777);
        }

        .bar-fill.v2 {
            background: linear-gradient(90deg, #42a5f5, var(--accent-blue));
        }

        /* Radar Chart Premium */
        .radar-box {
            display: flex;
            justify-content: center;
            padding: 2rem 0;
            position: relative;
        }

        .radar-svg {
            width: 100%;
            max-width: 600px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.05));
        }

        .radar-grid circle {
            stroke: #e0e0e0;
            fill: none;
            stroke-width: 0.5;
        }

        .radar-grid line {
            stroke: #efefef;
            stroke-width: 0.8;
        }

        .radar-label {
            font-size: 3.5px;
            fill: #555;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .radar-value-tag {
            font-size: 3px;
            fill: #fff;
            font-weight: 900;
        }

        .radar-poly {
            fill-opacity: 0.2;
            stroke-width: 1.5;
            transition: all 1s ease;
            cursor: crosshair;
        }

        .radar-poly.v1 {
            stroke: #999;
            fill: #999;
            filter: drop-shadow(0 0 5px rgba(150, 150, 150, 0.2));
        }

        .radar-poly.v2 {
            stroke: var(--accent-blue);
            fill: var(--accent-blue);
            filter: drop-shadow(0 0 8px rgba(0, 122, 255, 0.3));
        }

        .radar-poly.distill {
            stroke: var(--accent-purple);
            fill: var(--accent-purple);
            filter: drop-shadow(0 0 8px rgba(88, 86, 214, 0.3));
        }

        .data-point {
            r: 1.2;
            stroke-width: 0.8;
            stroke: #fff;
            transition: r 0.3s;
        }

        .data-point.v1 {
            fill: #999;
        }

        .data-point.v2 {
            fill: var(--accent-blue);
        }

        .data-point.distill {
            fill: var(--accent-purple);
        }

        .data-point:hover {
            r: 2;
        }

        .active-poly {
            opacity: 1 !important;
            stroke-width: 2.5 !important;
            fill-opacity: 0.4 !important;
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-top: 2rem;
        }

        .photo-item {
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
            border: 1px solid #eee;
            cursor: zoom-in;
            transition: all 0.5s var(--ease);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .photo-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .photo-item img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }

        /* Lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            padding: 2rem;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            transform: scale(0.9);
            transition: transform 0.5s var(--ease);
        }

        #lightbox.open {
            display: flex;
        }

        #lightbox.open img {
            transform: scale(1);
        }

        @keyframes draw {
            from {
                stroke-dashoffset: 600;
            }

            to {
                stroke-dashoffset: 0;
            }
        }

        @media (max-width: 700px) {
            .container {
                padding: 2rem 1rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            .report-box {
                padding: 2rem 1.5rem;
            }

            .bar-row {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div class="container">
        <header>
            <h1>訓練數據詳細報告</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="compare">優化成效</button>
            <button class="tab-btn" data-tab="v1">v1.0 數據</button>
            <button class="tab-btn" data-tab="v2">v2.0 數據</button>
            <button class="tab-btn" data-tab="distill">知識蒸餾</button>
        </div>

        <!-- 1. 優化成效 -->
        <div id="compare" class="content-section active">
            <div class="report-box">
                <h2 class="section-title">精度指標對比 (mAP@0.5)</h2>
                <div class="bar-chart">
                    <div class="bar-row">
                        <span class="cat-name">Person</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="49.2">0.492</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="82.3">0.823</div>
                            </div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="cat-name">Knife</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="59.6">0.596</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="61.5">0.615</div>
                            </div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="cat-name">Scissors</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="73.1">0.731</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="72.8">0.728</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="report-box">
                <h2 class="section-title">前後訓練性能詳細對比 (含數值標註)</h2>
                <div class="radar-box">
                    <svg class="radar-svg" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad-v2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#007aff; stop-opacity:0.6" />
                                <stop offset="100%" style="stop-color:#007aff; stop-opacity:0.2" />
                            </linearGradient>
                        </defs>
                        <g transform="translate(70, 70)">
                            <!-- Grid -->
                            <g class="radar-grid">
                                <circle r="10" />
                                <circle r="20" />
                                <circle r="30" />
                                <circle r="40" />
                                <circle r="50" />
                                <line x1="0" y1="-50" x2="0" y2="50" />
                                <line x1="-43.3" y1="-25" x2="43.3" y2="25" />
                                <line x1="-43.3" y1="25" x2="43.3" y2="-25" />
                            </g>

                            <!-- Labels -->
                            <text y="-56" text-anchor="middle" class="radar-label">人 True Positive</text>
                            <text x="50" y="-30" text-anchor="start" class="radar-label">刀 True Positive</text>
                            <text x="50" y="34" text-anchor="start" class="radar-label">剪刀 True Positive</text>
                            <text y="58" text-anchor="middle" class="radar-label">人 AP@0.5</text>
                            <text x="-50" y="34" text-anchor="end" class="radar-label">刀 AP@0.5</text>
                            <text x="-50" y="-30" text-anchor="end" class="radar-label">剪刀 AP@0.5</text>

                            <!-- V1 Polygon -->
                            <!-- Values: 0.436, 0.58, 0.66, 0.492, 0.615, 0.36 -->
                            <polygon class="radar-poly v1"
                                points="0,-21.8 25.1,-14.5 28.6,16.5 0,24.6 -26.6,15.4 -15.6,-9" />

                            <!-- V2 Polygon -->
                            <!-- Values: 0.879, 0.64, 0.70, 0.823, 0.615, 0.728 -->
                            <polygon id="poly-v2" class="radar-poly v2"
                                points="0,-43.9 27.7,-16 30.3,17.5 0,41.1 -26.6,15.4 -31.5,-18" />

                            <!-- V2 Data Points & Value Tags -->
                            <g id="points-v2">
                                <circle class="data-point v2" cx="0" cy="-43.9" /><text x="0" y="-46"
                                    text-anchor="middle" class="radar-value-tag" style="fill:#007aff">0.879</text>
                                <circle class="data-point v2" cx="27.7" cy="-16" /><text x="31" y="-18"
                                    text-anchor="start" class="radar-value-tag" style="fill:#007aff">0.64</text>
                                <circle class="data-point v2" cx="30.3" cy="17.5" /><text x="34" y="20"
                                    text-anchor="start" class="radar-value-tag" style="fill:#007aff">0.70</text>
                                <circle class="data-point v2" cx="0" cy="41.1" /><text x="0" y="46" text-anchor="middle"
                                    class="radar-value-tag" style="fill:#007aff">0.823</text>
                                <circle class="data-point v2" cx="-26.6" cy="15.4" /><text x="-31" y="18"
                                    text-anchor="end" class="radar-value-tag" style="fill:#007aff">0.615</text>
                                <circle class="data-point v2" cx="-31.5" cy="-18" /><text x="-35" y="-20"
                                    text-anchor="end" class="radar-value-tag" style="fill:#007aff">0.728</text>
                            </g>

                            <!-- V1 Value Tags (Subtle) -->
                            <g style="opacity:0.6">
                                <text x="0" y="-24" text-anchor="middle" style="font-size:2.5px; fill:#777">0.436</text>
                                <text x="30" y="14" text-anchor="start" style="font-size:2.5px; fill:#777">0.66</text>
                            </g>
                        </g>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 2. v1.0 數據 -->
        <div id="v1" class="content-section">
            <div class="photo-grid">
                <div class="photo-item"><img src="./assets/training_v1_1.png" alt="v1_1"></div>
                <div class="photo-item"><img src="./assets/training_v1_3.png" alt="v1_3"></div>
            </div>
        </div>

        <!-- 3. v2.0 數據 -->
        <div id="v2" class="content-section">
            <div class="photo-grid">
                <div class="photo-item"><img src="./assets/training_v2_1.png" alt="v2_1"></div>
                <div class="photo-item"><img src="./assets/training_v2_3.png" alt="v2_3"></div>
            </div>
        </div>

        <!-- 4. 知識蒸餾 -->
        <div id="distill" class="content-section">
            <div class="report-box">
                <h2 class="section-title">知識蒸餾核心效能 (數據可視化)</h2>
                <div class="radar-box">
                    <svg class="radar-svg" viewBox="0 0 140 140">
                        <g transform="translate(70, 70)">
                            <g class="radar-grid">
                                <circle r="10" />
                                <circle r="20" />
                                <circle r="30" />
                                <circle r="40" />
                                <circle r="50" />
                                <line x1="0" y1="-50" x2="0" y2="50" />
                                <line x1="-43.3" y1="-25" x2="43.3" y2="25" />
                                <line x1="-43.3" y1="25" x2="43.3" y2="-25" />
                            </g>
                            <!-- Labels (Axis for Distillation Data) -->
                            <text y="-56" text-anchor="middle" class="radar-label">人 AP@0.5 (PR)</text>
                            <text x="50" y="-30" text-anchor="start" class="radar-label">人 True Positive</text>
                            <text x="50" y="34" text-anchor="start" class="radar-label">刀 True Positive</text>
                            <text y="58" text-anchor="middle" class="radar-label">剪刀 True Positive</text>
                            <text x="-50" y="34" text-anchor="end" class="radar-label">剪刀 AP@0.5</text>
                            <text x="-50" y="-30" text-anchor="end" class="radar-label">刀 AP@0.5</text>

                            <!-- Before Polygon -->
                            <polygon class="radar-poly v1"
                                points="0,-21.8 27.7,-14.5 28.6,16.5 0,24.1 -26.6,15.4 -15.6,-9" />
                            <!-- After Distill Polygon -->
                            <polygon class="radar-poly distill"
                                points="0,-41.1 28.6,-15.5 30.3,17.5 0,41.1 -26.6,15.4 -31.5,-18" />

                            <!-- Distill Data Points -->
                            <g>
                                <circle class="data-point distill" cx="0" cy="-41.1" /><text x="0" y="-45"
                                    text-anchor="middle" class="radar-value-tag"
                                    style="fill:var(--accent-purple)">0.823</text>
                                <circle class="data-point distill" cx="28.6" cy="-15.5" /><text x="32" y="-17"
                                    text-anchor="start" class="radar-value-tag"
                                    style="fill:var(--accent-purple)">0.64</text>
                                <circle class="data-point distill" cx="30.3" cy="17.5" /><text x="34" y="20"
                                    text-anchor="start" class="radar-value-tag"
                                    style="fill:var(--accent-purple)">0.70</text>
                                <circle class="data-point distill" cx="0" cy="41.1" /><text x="0" y="46"
                                    text-anchor="middle" class="radar-value-tag"
                                    style="fill:var(--accent-purple)">0.823</text>
                                <circle class="data-point distill" cx="-26.6" cy="15.4" /><text x="-31" y="18"
                                    text-anchor="end" class="radar-value-tag"
                                    style="fill:var(--accent-purple)">0.615</text>
                                <circle class="data-point distill" cx="-31.5" cy="-18" /><text x="-36" y="-20"
                                    text-anchor="end" class="radar-value-tag"
                                    style="fill:var(--accent-purple)">0.728</text>
                            </g>
                        </g>
                    </svg>
                </div>
            </div>
            <div class="photo-grid">
                <div class="photo-item"><img src="./assets/training_distill_1.png" alt="distill_1"></div>
                <div class="photo-item"><img src="./assets/training_distill_2.png" alt="distill_2"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox"><img src="" alt=""></div>

    <script>
        // Smooth Custom Cursor
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
        });

        function animateCursor() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;
            ring.style.left = ringX + 'px';
            ring.style.top = ringY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        document.querySelectorAll('button, .photo-item, .radar-poly').forEach(el => {
            el.addEventListener('mouseenter', () => {
                ring.style.transform = 'translate(-50%,-50%) scale(1.4)';
                ring.style.borderColor = 'rgba(200, 169, 126, 0.8)';
            });
            el.addEventListener('mouseleave', () => {
                ring.style.transform = 'translate(-50%,-50%) scale(1)';
                ring.style.borderColor = 'rgba(200, 169, 126, 0.4)';
            });
        });

        // Tabs & Bars
        function animateBars() {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                bar.style.width = bar.getAttribute('data-val') + '%';
            });
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'compare') {
                    document.querySelectorAll('.bar-fill').forEach(b => b.style.width = '0%');
                    setTimeout(animateBars, 100);
                }
            });
        });

        // Lightbox
        const lb = document.getElementById('lightbox'), lbI = lb.querySelector('img');
        document.querySelectorAll('.photo-item img').forEach(i => {
            i.addEventListener('click', () => { lbI.src = i.src; lb.classList.add('open'); });
        });
        lb.addEventListener('click', () => lb.classList.remove('open'));

        // Poly Hover Effect
        document.querySelectorAll('.radar-poly').forEach(p => {
            p.addEventListener('mouseenter', () => p.classList.add('active-poly'));
            p.addEventListener('mouseleave', () => p.classList.remove('active-poly'));
        });

        setTimeout(animateBars, 500);
    </script>
</body>

</html>
