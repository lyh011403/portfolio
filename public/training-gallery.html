<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訓練數據詳細報告</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            /* Light grey/white like Image 1 */
            --surface: #ffffff;
            --border: #e9ecef;
            --accent-blue: #007aff;
            --accent-grey: #8e8e93;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            padding-bottom: 5rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        header {
            margin-bottom: 3.5rem;
            text-align: left;
        }

        .model-tag {
            background: #e1f0ff;
            color: var(--accent-blue);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .model-tag::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-sub);
            border: none;
            padding: 0.5rem 0;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn.active {
            color: var(--accent-blue);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-blue);
            border-radius: 2px;
        }

        /* Sections */
        .content-section {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .content-section.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Report Box */
        .report-box {
            background: var(--surface);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: #000;
        }

        /* Animated Bar Chart */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .bar-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            gap: 1.5rem;
        }

        .cat-name {
            font-weight: 600;
            color: #333;
        }

        .bar-pair {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .bar-bg {
            background: #f1f3f5;
            height: 28px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 0.75rem;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .bar-fill.v1 {
            background: var(--accent-grey);
        }

        .bar-fill.v2 {
            background: var(--accent-blue);
        }

        .legend {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-sub);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        .dot.v1 {
            background: var(--accent-grey);
        }

        .dot.v2 {
            background: var(--accent-blue);
        }

        /* Animated Radar SVG */
        .radar-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
        }

        .radar-svg {
            width: 100%;
            max-width: 500px;
            height: auto;
        }

        .radar-grid circle,
        .radar-grid line {
            stroke: #dee2e6;
            fill: none;
            stroke-width: 0.5;
        }

        .radar-label {
            font-size: 3.5px;
            fill: var(--text-sub);
            font-weight: 600;
        }

        .radar-val {
            font-size: 3px;
            fill: var(--text-main);
            font-weight: 700;
        }

        .radar-poly {
            fill-opacity: 0.25;
            stroke-width: 1;
            transition: all 1s ease;
        }

        .radar-poly.v1 {
            stroke: var(--accent-grey);
            fill: var(--accent-grey);
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: draw 2s forwards;
        }

        .radar-poly.v2 {
            stroke: var(--accent-blue);
            fill: var(--accent-blue);
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: draw 2s 0.6s forwards;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .photo-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .photo-card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }

        .photo-card .info {
            padding: 1rem 1.5rem;
        }

        .photo-card h4 {
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .photo-card p {
            font-size: 0.75rem;
            color: var(--text-sub);
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem 1rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }

            .bar-row {
                grid-template-columns: 80px 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="model-tag">INTELLIGENT VISION SYSTEM</div>
            <h1>訓練數據詳細報告</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="compare">優化成效</button>
            <button class="tab-btn" data-tab="v1">v1.0 數據</button>
            <button class="tab-btn" data-tab="v2">v2.0 數據</button>
        </div>

        <!-- 優化成效頁面 -->
        <div id="compare" class="content-section active">
            <div class="report-box">
                <h2 class="section-title">優化成效</h2>
                <div class="bar-chart">
                    <div class="bar-row">
                        <span class="cat-name">Person (mAP)</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="49.2">0.492</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="82.3">0.823</div>
                            </div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="cat-name">Knife (mAP)</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="59.6">0.596</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="61.5">0.615</div>
                            </div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="cat-name">Scissors (mAP)</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="73.1">0.731</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="72.8">0.728</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="dot v1"></div> v1.0 (Before)
                    </div>
                    <div class="legend-item">
                        <div class="dot v2"></div> v2.0 (After)
                    </div>
                </div>
            </div>

            <div class="report-box">
                <h2 class="section-title">前後訓練性能比較</h2>
                <div class="radar-box">
                    <svg class="radar-svg" viewBox="0 0 120 120">
                        <!-- Grid circles -->
                        <g class="radar-grid">
                            <circle cx="60" cy="60" r="10" />
                            <circle cx="60" cy="60" r="20" />
                            <circle cx="60" cy="60" r="30" />
                            <circle cx="60" cy="60" r="40" />
                            <circle cx="60" cy="60" r="50" />
                            <!-- Axis lines (6 axes) -->
                            <line x1="60" y1="10" x2="60" y2="110" />
                            <line x1="16.7" y1="35" x2="103.3" y2="85" />
                            <line x1="16.7" y1="85" x2="103.3" y2="35" />
                        </g>
                        <!-- Labels -->
                        <text x="60" y="7" text-anchor="middle" class="radar-label">人 TP (CM)</text>
                        <text x="110" y="33" text-anchor="middle" class="radar-label">刀 TP (CM)</text>
                        <text x="110" y="88" text-anchor="middle" class="radar-label">剪刀 TP (CM)</text>
                        <text x="60" y="117" text-anchor="middle" class="radar-label">人 AP (PR)</text>
                        <text x="10" y="88" text-anchor="middle" class="radar-label">刀 AP (PR)</text>
                        <text x="10" y="33" text-anchor="middle" class="radar-label">剪刀 AP (PR)</text>

                        <!-- V1 Data (Before) 
                             人TP: 0.436 (r=21.8), 刀TP: 0.58 (r=29), 剪刀TP: 0.66 (r=33), 人AP: 0.492 (r=24.6), 刀AP: 0.615 (r=30.7), 剪刀AP: 0.36 (r=18)
                        -->
                        <polygon class="radar-poly v1" points="60,38.2 85.1,45.5 88.6,76.5 60,84.6 33.4,75.4 44.4,51" />

                        <!-- V2 Data (After)
                             人TP: 0.879 (r=43.9), 刀TP: 0.64 (r=32), 剪刀TP: 0.70 (r=35), 人AP: 0.823 (r=41.1), 刀AP: 0.615 (r=30.7), 剪刀AP: 0.728 (r=36.4)
                        -->
                        <polygon class="radar-poly v2" points="60,16.1 87.7,44 90.3,77.5 60,101.1 33.4,75.4 28.5,42" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- v1.0 數據 (2x2) -->
        <div id="v1" class="content-section">
            <div class="report-box">
                <h2 class="section-title">v1.0 訓練詳情</h2>
                <div class="photo-grid">
                    <div class="photo-card">
                        <img src="./assets/training_v1_1.png" alt="v1_1">
                        <div class="info">
                            <h4>標註樣本採集</h4>
                            <p>第一階段核心對象識別</p>
                        </div>
                    </div>
                    <div class="photo-card">
                        <img src="./assets/training_v1_3.png" alt="v1_3">
                        <div class="info">
                            <h4>初步模型熱圖</h4>
                            <p>視覺特徵分佈檢測</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- v2.0 數據 (2x2) -->
        <div id="v2" class="content-section">
            <div class="report-box">
                <h2 class="section-title">v2.0 優化詳情</h2>
                <div class="photo-grid">
                    <div class="photo-card">
                        <img src="./assets/training_v2_1.png" alt="v2_1">
                        <div class="info">
                            <h4>資料增強疊加</h4>
                            <p>仿真多樣化場景樣本</p>
                        </div>
                    </div>
                    <div class="photo-card">
                        <img src="./assets/training_v2_3.png" alt="v2_3">
                        <div class="info">
                            <h4>精確度收斂圖</h4>
                            <p>損失函數穩定下移曲線</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function animateBars() {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                const val = bar.getAttribute('data-val');
                bar.style.width = val + '%';
            });
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));

                btn.classList.add('active');
                const target = document.getElementById(btn.dataset.tab);
                target.classList.add('active');

                if (btn.dataset.tab === 'compare') {
                    document.querySelectorAll('.bar-fill').forEach(b => b.style.width = '0%');
                    setTimeout(animateBars, 100);
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        setTimeout(animateBars, 500);
    </script>
</body>

</html>
