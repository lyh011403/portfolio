<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訓練數據詳細報告</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #ffffff;
            --border: #e9ecef;
            --accent-blue: #007aff;
            --accent-grey: #8e8e93;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f7;
            /* High-end light grey */
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            padding-bottom: 5rem;
            cursor: none;
            /* Hide default cursor */
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        header {
            margin-bottom: 3.5rem;
            text-align: left;
            border-left: 5px solid var(--accent-blue);
            padding-left: 1.5rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.01em;
            color: #000;
        }

        /* Custom Cursor in Iframe */
        #cursor-dot {
            width: 8px;
            height: 8px;
            background: #c8a97e;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }

        #cursor-ring {
            width: 30px;
            height: 30px;
            border: 1.5px solid rgba(200, 169, 126, 0.4);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid #dee2e6;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-sub);
            border: none;
            padding: 0.75rem 0;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn.active {
            color: var(--accent-blue);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-blue);
        }

        /* Sections */
        .content-section {
            display: none;
            margin-top: 2rem;
        }

        .content-section.active {
            display: block;
            animation: fadeInUp 0.6s var(--ease) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Report Box */
        .report-box {
            background: #fff;
            border-radius: 28px;
            padding: 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            margin-bottom: 2rem;
            border: 1px solid #eee;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            color: #000;
        }

        /* Animated Bar Chart */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .bar-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            align-items: center;
            gap: 2rem;
        }

        .cat-name {
            font-weight: 700;
            font-size: 1rem;
            color: #333;
        }

        .bar-pair {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .bar-bg {
            background: #f2f2f7;
            height: 32px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 1.8s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 1rem;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .bar-fill.v1 {
            background: var(--accent-grey);
        }

        .bar-fill.v2 {
            background: var(--accent-blue);
        }

        /* Animated Radar SVG */
        .radar-box {
            display: flex;
            justify-content: center;
            padding: 2rem 0;
        }

        .radar-svg {
            width: 100%;
            max-width: 550px;
            height: auto;
        }

        .radar-grid circle,
        .radar-grid line {
            stroke: #e5e5ea;
            fill: none;
            stroke-width: 0.4;
        }

        .radar-label {
            font-size: 3px;
            fill: #8e8e93;
            font-weight: 700;
        }

        .radar-poly {
            fill-opacity: 0.3;
            stroke-width: 1.2;
            transition: all 1s ease;
        }

        .radar-poly.v1 {
            stroke: var(--accent-grey);
            fill: var(--accent-grey);
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: draw 2s forwards;
        }

        .radar-poly.v2 {
            stroke: var(--accent-blue);
            fill: var(--accent-blue);
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: draw 2s 0.6s forwards;
        }

        /* Photo Grid (2x2) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .photo-item {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
            border: 1px solid #eee;
            cursor: zoom-in;
            transition: transform 0.4s var(--ease);
        }

        .photo-item:hover {
            transform: scale(1.02);
        }

        .photo-item img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }

        /* Lightbox logic within iframe */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            padding: 2rem;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            transform: scale(0.9);
            transition: transform 0.4s var(--ease);
        }

        #lightbox.open {
            display: flex;
        }

        #lightbox.open img {
            transform: scale(1);
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        @media (max-width: 700px) {
            .photo-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div class="container">
        <header>
            <h1>訓練數據詳細報告</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="compare">優化成效</button>
            <button class="tab-btn" data-tab="v1">v1.0 數據</button>
            <button class="tab-btn" data-tab="v2">v2.0 數據</button>
            <button class="tab-btn" data-tab="distill">知識蒸餾</button>
        </div>

        <!-- 優化成效 -->
        <div id="compare" class="content-section active">
            <div class="report-box">
                <h2 class="section-title">精度指標對比 (mAP@0.5)</h2>
                <div class="bar-chart">
                    <div class="bar-row">
                        <span class="cat-name">Person</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="49.2">0.492</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="82.3">0.823</div>
                            </div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="cat-name">Knife</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="59.6">0.596</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="61.5">0.615</div>
                            </div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="cat-name">Scissors</span>
                        <div class="bar-pair">
                            <div class="bar-bg">
                                <div class="bar-fill v1" data-val="73.1">0.731</div>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill v2" data-val="72.8">0.728</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="report-box">
                <h2 class="section-title">前後訓練性能比較 (雷達數據化)</h2>
                <div class="radar-box">
                    <svg class="radar-svg" viewBox="0 0 120 120">
                        <g class="radar-grid">
                            <circle cx="60" cy="60" r="10" />
                            <circle cx="60" cy="60" r="20" />
                            <circle cx="60" cy="60" r="30" />
                            <circle cx="60" cy="60" r="40" />
                            <circle cx="60" cy="60" r="50" />
                            <line x1="60" y1="10" x2="60" y2="110" />
                            <line x1="16.7" y1="35" x2="103.3" y2="85" />
                            <line x1="16.7" y1="85" x2="103.3" y2="35" />
                        </g>
                        <text x="60" y="7" text-anchor="middle" class="radar-label">人 True Positive</text>
                        <text x="110" y="33" text-anchor="middle" class="radar-label">刀 True Positive</text>
                        <text x="110" y="88" text-anchor="middle" class="radar-label">剪刀 True Positive</text>
                        <text x="60" y="117" text-anchor="middle" class="radar-label">人 AP@0.5</text>
                        <text x="10" y="88" text-anchor="middle" class="radar-label">刀 AP@0.5</text>
                        <text x="10" y="33" text-anchor="middle" class="radar-label">剪刀 AP@0.5</text>

                        <!-- Plotting based on user provided radar image labels -->
                        <polygon class="radar-poly v1" points="60,38.2 85.1,45.5 88.6,76.5 60,84.6 33.4,75.4 44.4,51" />
                        <polygon class="radar-poly v2" points="60,16.1 87.7,44 90.3,77.5 60,101.1 33.4,75.4 28.5,42" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- v1.0 數據 -->
        <div id="v1" class="content-section">
            <div class="photo-grid">
                <div class="photo-item"><img src="./assets/training_v1_1.png" alt="v1_1"></div>
                <div class="photo-item"><img src="./assets/training_v1_3.png" alt="v1_3"></div>
            </div>
        </div>

        <!-- v2.0 數據 -->
        <div id="v2" class="content-section">
            <div class="photo-grid">
                <div class="photo-item"><img src="./assets/training_v2_1.png" alt="v2_1"></div>
                <div class="photo-item"><img src="./assets/training_v2_3.png" alt="v2_3"></div>
            </div>
        </div>

        <!-- 知識蒸餾 -->
        <div id="distill" class="content-section">
            <div class="photo-grid">
                <div class="photo-item"><img src="./assets/training_distill_1.png" alt="distill_1"></div>
                <div class="photo-item"><img src="./assets/training_distill_2.png" alt="distill_2"></div>
                <div class="photo-item"><img src="./assets/training_distill_3.png" alt="distill_3"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox Overlay -->
    <div id="lightbox"><img src="" alt=""></div>

    <script>
        // Custom Cursor Logic
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
        });

        const hoverElems = 'button, .photo-item';
        document.querySelectorAll(hoverElems).forEach(el => {
            el.addEventListener('mouseenter', () => ring.style.transform = 'translate(-50%, -50%) scale(1.5)');
            el.addEventListener('mouseleave', () => ring.style.transform = 'translate(-50%, -50%) scale(1)');
        });

        // Tabs Logic
        function animateBars() {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                const val = bar.getAttribute('data-val');
                bar.style.width = val + '%';
            });
        }
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'compare') {
                    document.querySelectorAll('.bar-fill').forEach(b => b.style.width = '0%');
                    setTimeout(animateBars, 100);
                }
            });
        });

        // Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lbImg = lightbox.querySelector('img');
        document.querySelectorAll('.photo-item img').forEach(img => {
            img.addEventListener('click', () => {
                lbImg.src = img.src;
                lightbox.classList.add('open');
            });
        });
        lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

        setTimeout(animateBars, 500);
    </script>
</body>

</html>
