<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訓練資料集展示</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #c8a97e;
            --text-1: #f5f5f5;
            --text-2: #a0a0a8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-1);
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        p.subtitle {
            color: var(--text-2);
            font-size: 0.9rem;
        }

        .section {
            margin-bottom: 4rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .line {
            height: 1px;
            background: var(--border);
            flex-grow: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 1rem;
        }

        .card-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-2);
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>訓練資料集演進</h1>
            <p class="subtitle">從初步標註到深度優化，記錄 AI 模型的成長過程。</p>
        </header>

        <!-- 1.0版 -->
        <div class="section">
            <div class="section-header">
                <h2>1.0 版：基礎訓練集</h2>
                <div class="line"></div>
            </div>
            <div class="grid">
                <div class="card">
                    <img src="./assets/training_v1_1.png" alt="1.0-1">
                    <div class="card-info">
                        <h3>初始影像採集與標註</h3>
                    </div>
                </div>
                <div class="card">
                    <img src="./assets/training_v1_2.png" alt="1.0-2">
                    <div class="card-info">
                        <h3>環境多樣性涵蓋</h3>
                    </div>
                </div>
                <div class="card">
                    <img src="./assets/training_v1_3.png" alt="1.0-3">
                    <div class="card-info">
                        <h3>模型初步驗證</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2.0版 -->
        <div class="section">
            <div class="section-header">
                <h2>2.0 版：強化訓練集</h2>
                <div class="line"></div>
            </div>
            <div class="grid">
                <div class="card">
                    <img src="./assets/training_v2_1.png" alt="2.0-1">
                    <div class="card-info">
                        <h3>資料增強與雜訊過濾</h3>
                    </div>
                </div>
                <div class="card">
                    <img src="./assets/training_v2_2.png" alt="2.0-2">
                    <div class="card-info">
                        <h3>邊角案例優化</h3>
                    </div>
                </div>
                <div class="card">
                    <img src="./assets/training_v2_3.png" alt="2.0-3">
                    <div class="card-info">
                        <h3>精度大幅提升</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- 知識蒸餾 -->
        <div class="section">
            <div class="section-header">
                <h2>知識蒸餾：邊緣端優化</h2>
                <div class="line"></div>
            </div>
            <div class="grid">
                <div class="card">
                    <img src="./assets/training_distill_1.png" alt="Distill-1">
                    <div class="card-info">
                        <h3>Teacher 模型特徵提取</h3>
                    </div>
                </div>
                <div class="card">
                    <img src="./assets/training_distill_2.png" alt="Distill-2">
                    <div class="card-info">
                        <h3>Student 模型知識轉移</h3>
                    </div>
                </div>
                <div class="card">
                    <img src="./assets/training_distill_3.png" alt="Distill-3">
                    <div class="card-info">
                        <h3>輕量化部署效能測試</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
